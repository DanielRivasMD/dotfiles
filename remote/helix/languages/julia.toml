####################################################################################################
# julia
####################################################################################################

[language-server.julia_lsp]
command = "jlang"
args = ["lsp"]

[[language]]
name = "julia"
scope = "source.julia"
file-types = ["jl"]
roots = ["Project.toml", "Manifest.toml"]
auto-format = true
comment-token = "#"
language-servers = ["julia_lsp"]
indent = { tab-width = 2, unit = "\t" }
formatter = { command = "jlang", timeout = 30, args = ["format"] }
diagnostic-severity = "hint"

[[grammar]]
name = "julia"
source = { git = "https://github.com/tree-sitter/tree-sitter-julia", rev = "e0f9dcd180fdcfcfa8d79a3531e11d99e79321d3" }

####################################################################################################
