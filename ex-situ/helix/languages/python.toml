####################################################################################################
# python
####################################################################################################

[language-server.ruff-lsp]
command = "ruff-lsp"
args = ["server"]

[[language]]
name = "python"
scope = "source.python"
injection-regex = "python"
file-types = ["py"]
shebangs = ["python"]
roots = [".git"]
comment-token = "#"
language-servers = ["ruff-lsp"]
indent = { tab-width = 2, unit = "  " }
auto-format = true
formatter = { command = "ruff", args = ["format", "-"] }

[[grammar]]
name = "python"
source = { git = "https://github.com/tree-sitter/tree-sitter-python", rev = "master" }

####################################################################################################
