####################################################################################################
# R
####################################################################################################

[language-server.R_lsp]
command = "R"
args = ["--slave", "-e", "languageserver::run()"]

[language-server.R_lsp.config]
diagnostics = true
completion = true
signatureHelp = true
hover = true
documentSymbols = true
workspaceSymbols = true
formatting = true

[[language]]
name = "r"
scope = "source.r"
injection-regex = "(r|R)"
file-types = ["r", "R"]
shebangs = ["r", "R"]
roots = ["DESCRIPTION", ".git"]
comment-tokens = ["#"]
block-comment-tokens = [{ start = "#'", end = "" }]
language-servers = ["R_lsp"]
indent = { tab-width = 2, unit = "  " }

[[grammar]]
name = "r"
source = { git = "https://github.com/r-lib/tree-sitter-r", rev = "main" }

[[language]]
name = "rmarkdown"
scope = "source.rmd"
injection-regex = "(r|R)md"
file-types = ["rmd", "Rmd", "Rmarkdown"]
roots = []
comment-tokens = ["#"]
language-servers = ["R_lsp"]
indent = { tab-width = 2, unit = "  " }
grammar = "markdown"

####################################################################################################
