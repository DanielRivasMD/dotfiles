####################################################################################################
# bash
####################################################################################################

[language-server.bash_lsp]
command = "bash-language-server"
args = ["start"]

[language-server.bash_lsp.config]
backgroundAnalysisMaxFiles = 500
enableSourceErrorDiagnostics = true
globPattern = "**/*.{sh}"
includeAllWorkspaceSymbols = false

[[language]]
name = "bash"
scope = "source.bash"
injection-regex = "(shell|bash|zsh|sh)"
file-types = [
  "sh",
  "bash",
  "zsh",
  ".aliases",
  ".bash_login",
  ".bash_logout",
  ".bash_profile",
  ".bashrc",
  ".profile",
  ".zshenv",
  ".zlogin",
  ".zlogout",
  ".zprofile",
  ".zshrc",
  "APKBUILD",
  "PKGBUILD",
  "eclass",
  "ebuild",
  "bazelrc",
]
shebangs = ["sh", "bash", "dash"]
roots = [".git"]
comment-token = "#"
language-servers = ["bash_lsp"]
formatter = { command = "shfmt", args = ["-i", "2", "-ci"] }
indent = { tab-width = 2, unit = "\t" }

[[grammar]]
name = "bash"
source = { git = "https://github.com/tree-sitter/tree-sitter-bash", rev = "master" }

####################################################################################################
