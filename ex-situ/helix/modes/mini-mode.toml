n = "move_parent_node_start"
space = "select_prev_sibling"
e = "no_op"

[keys.normal."]"]
"]" = "goto_next_entry"
ret = "open_below"
n = "move_parent_node_end"
space = "select_next_sibling"
e = "no_op"


####################################################################################################

[keys.normal.";"]
ret = "shell_pipe"
"\\" = "shell_pipe_to"
i = "shell_insert_output"
