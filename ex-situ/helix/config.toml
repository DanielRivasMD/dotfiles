####################################################################################################
# theme
####################################################################################################

# theme = "adwaita-dark"
theme = "base16_custom"
# theme = "base16_transparent"
# theme = "catppuccin_frappe"
# theme = "catppuccin_macchiato"
# theme = "catppuccin_mocha"
# theme = "dark_plus"
# theme = "fleet_dark"
# theme = "github_dark"
# theme = "molokai"
# theme = "osaka"
# theme = "snazzy"
# theme = "solarized-osaka"

####################################################################################################
####################################################################################################

[editor]
scrolloff = 3
mouse = true
rulers = [100]
bufferline = "always"
shell = ["sh", "-c"]

path-completion = true
continue-comments = false
completion-replace = false
cursorline = true
cursorcolumn = true

auto-completion = false
auto-info = true
auto-format = false

color-modes = true

end-of-line-diagnostics = "error"

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.lsp]
display-inlay-hints = true

[editor.smart-tab]
enable = false

####################################################################################################

[editor.gutters]
layout = ["diff", "diagnostics", "line-numbers", "spacer"]

####################################################################################################

[editor.cursor-shape]
normal = "bar"
insert = "underline"
select = "block"

####################################################################################################

[editor.statusline]
left = ["mode", "spinner", "diagnostics"]
center = [
	"file-modification-indicator",
	"file-name",
	"read-only-indicator",
	"version-control",
]
right = [
	"selections",
	"position",
	"primary-selection-length",
	"file-encoding",
	"file-type",
]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"


####################################################################################################

[editor.file-picker]
hidden = false

####################################################################################################

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

####################################################################################################

[editor.whitespace.render]
space = "all"
tab = "all"
newline = "all"

[editor.whitespace.characters]
space = "·"
nbsp = "␣"
tab = "→"
tabpad = "·"
newline = "↵"

####################################################################################################
####################################################################################################

[keys.insert.","]
"," = "normal_mode"

####################################################################################################

[keys.normal."["]
"[" = "goto_prev_entry"
"\\" = "move_parent_node_start"
ret = "open_above"
space = "select_prev_sibling"
e = "no_op"

[keys.normal."]"]
"]" = "goto_next_entry"
"\\" = "move_parent_node_end"
ret = "open_below"
space = "select_next_sibling"
e = "no_op"


####################################################################################################

[keys.normal.";"]
"[" = "shell_insert_output"
"]" = "shell_append_output"
";" = "shell_keep_pipe"
"\\" = "shell_pipe_to"
ret = "shell_pipe"


####################################################################################################

[keys.normal."'"]
"'" = "match_brackets"
a = "select_textobject_around"
s = "select_textobject_inner"
z = "surround_add"
c = "surround_replace"
x = "surround_delete"


####################################################################################################

[keys.normal."\\"]
