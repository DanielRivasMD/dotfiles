####################################################################################################
# awk
####################################################################################################

[language-server.awk_lsp]
command = "awk-language-server"

[language-server.awk_lsp.config]
diagnostics = true
completion = true
hover = true

[[language]]
name = "awk"
scope = "source.awk"
injection-regex = "awk"
file-types = ["awk", "*.awk"]
shebangs = ["awk"]
comment-token = "#"
language-servers = ["awk_lsp"]
indent = { tab-width = 2, unit = "  " }

[[grammar]]
name = "awk"
source = { git = "https://github.com/Beaglefoot/tree-sitter-awk", rev = "master" }

####################################################################################################
####################################################################################################
# bash
####################################################################################################

[language-server.bash_lsp]
command = "bash-language-server"
args = ["start"]

[language-server.bash_lsp.config]
backgroundAnalysisMaxFiles = 500
enableSourceErrorDiagnostics = true
globPattern = "**/*.{sh}"
includeAllWorkspaceSymbols = false

[[language]]
name = "bash"
scope = "source.bash"
injection-regex = "(shell|bash|zsh|sh)"
file-types = [
  "sh",
  "bash",
  "zsh",
  ".aliases",
  ".bash_login",
  ".bash_logout",
  ".bash_profile",
  ".bashrc",
  ".profile",
  ".zshenv",
  ".zlogin",
  ".zlogout",
  ".zprofile",
  ".zshrc",
  "APKBUILD",
  "PKGBUILD",
  "eclass",
  "ebuild",
  "bazelrc",
]
shebangs = ["sh", "bash", "dash"]
roots = [".git"]
comment-token = "#"
language-servers = ["bash_lsp"]
formatter = { command = "shfmt", args = ["-i", "2", "-ci"] }
indent = { tab-width = 2, unit = "\t" }

[[grammar]]
name = "bash"
source = { git = "https://github.com/tree-sitter/tree-sitter-bash", rev = "master" }

